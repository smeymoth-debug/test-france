<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELF A1.2 Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .streak-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 flex flex-col min-h-[600px]">
    </div>

    <script>
        const apiKey = "YOUR_API_KEY_HERE"; 
        
        const QUIZ_DATA = [
            // Grammar: Passé Composé (1-10)
            { question: "Hier, j'___ mangé au restaurant.", options: ["suis", "ai", "as", "es"], correct: 1, explanation: "Most verbs use 'avoir' as the auxiliary in Passé Composé.", category: "Grammar" },
            { question: "Elle ___ allée au marché ce matin.", options: ["a", "est", "va", "es"], correct: 1, explanation: "The verb 'aller' uses 'être' and must agree in gender (allée).", category: "Grammar" },
            { question: "Nous ___ fini nos devoirs.", options: ["sommes", "avez", "avons", "ont"], correct: 2, explanation: "Finir uses 'avoir' in the past tense.", category: "Grammar" },
            { question: "Ils ___ venus nous voir.", options: ["ont", "sont", "vont", "seront"], correct: 1, explanation: "Venir is a 'DR MRS VANDERTRAMP' verb and uses être.", category: "Grammar" },
            { question: "Qu'est-ce que tu ___ fait hier ?", options: ["as", "es", "est", "a"], correct: 0, explanation: "Faire uses avoir; the past participle is 'fait'.", category: "Grammar" },
            { question: "Je ___ sorti la poubelle.", options: ["suis", "ai", "es", "as"], correct: 1, explanation: "When 'sortir' has a direct object, it uses avoir!", category: "Grammar" },
            { question: "Vous ___ entendu ce bruit ?", options: ["avez", "êtes", "as", "ont"], correct: 0, explanation: "Entendre uses avoir.", category: "Grammar" },
            { question: "Le film ___ déjà commencé.", options: ["est", "a", "va", "as"], correct: 1, explanation: "Commencer uses avoir.", category: "Grammar" },
            { question: "Elles ___ parties en vacances.", options: ["ont", "sont", "vont", "fais"], correct: 1, explanation: "Partir uses être + agreement (plural feminine).", category: "Grammar" },
            { question: "On ___ vu un beau film.", options: ["est", "a", "as", "es"], correct: 1, explanation: "Voir becomes 'vu' and uses avoir.", category: "Grammar" },

            // Grammar: Futur Proche (11-18)
            { question: "Ce soir, je ___ regarder la télé.", options: ["vais", "vas", "va", "vont"], correct: 0, explanation: "Futur Proche = Aller + Infinitive.", category: "Grammar" },
            { question: "Nous ___ partir à 8 heures.", options: ["allons", "allons", "allez", "vont"], correct: 0, explanation: "Nous allons + infinitive.", category: "Grammar" },
            { question: "Est-ce que tu ___ sortir ce week-end ?", options: ["vais", "vas", "va", "allez"], correct: 1, explanation: "Tu vas.", category: "Grammar" },
            { question: "Ils ___ acheter une nouvelle voiture.", options: ["vont", "va", "allez", "ont"], correct: 0, explanation: "Ils vont.", category: "Grammar" },
            { question: "Elle ___ se doucher.", options: ["va", "vas", "vont", "allons"], correct: 0, explanation: "Reflexive verbs follow 'aller'.", category: "Grammar" },
            { question: "Vous ___ manger avec nous ?", options: ["allez", "allons", "va", "vont"], correct: 0, explanation: "Vous allez.", category: "Grammar" },
            { question: "Je ___ ne pas venir.", options: ["vais", "vas", "va", "ai"], correct: 0, explanation: "Negation: Je vais ne pas...", category: "Grammar" },
            { question: "Demain, il ___ pleuvoir.", options: ["va", "est", "a", "fait"], correct: 0, explanation: "Weather in Futur Proche uses Aller.", category: "Grammar" },

            // Vocabulary: Directions & Places (19-27)
            { question: "Tournez ___ la gauche au feu rouge.", options: ["à", "sur", "dans", "chez"], correct: 0, explanation: "Directions use 'à'.", category: "Vocabulary" },
            { question: "Le cinéma est ___ la banque et l'école.", options: ["devant", "entre", "sous", "chez"], correct: 1, explanation: "'Entre' means between.", category: "Vocabulary" },
            { question: "Je vais ___ le médecin car je suis malade.", options: ["à", "chez", "dans", "en"], correct: 1, explanation: "Use 'chez' for people/professions.", category: "Vocabulary" },
            { question: "Continuez tout ___.", options: ["droit", "droite", "gauche", "loin"], correct: 0, explanation: "'Tout droit' means straight ahead.", category: "Vocabulary" },
            { question: "La bibliothèque est ___ de la poste.", options: ["à côté", "en", "dans", "sur"], correct: 0, explanation: "à côté de = next to.", category: "Vocabulary" },
            { question: "Pardon, pour aller ___ la gare s'il vous plaît ?", options: ["à", "au", "en", "dans"], correct: 0, explanation: "Gare is feminine (à la).", category: "Vocabulary" },
            { question: "Le chat est ___ la table.", options: ["sous", "entre", "chez", "vers"], correct: 0, explanation: "Sous = under.", category: "Vocabulary" },
            { question: "J'habite ___ cinquième étage.", options: ["à", "au", "en", "sur"], correct: 1, explanation: "Au = at the (masculine).", category: "Vocabulary" },
            { question: "La boulangerie est ___ face de l'église.", options: ["à", "en", "au", "sur"], correct: 1, explanation: "En face de = opposite.", category: "Vocabulary" },

            // Vocabulary: Daily Routine (28-36)
            { question: "Le matin, je ___ réveille à 7h.", options: ["me", "te", "se", "nous"], correct: 0, explanation: "Reflexive: Je me.", category: "Vocabulary" },
            { question: "Nous ___ brossons les dents.", options: ["nous", "vous", "se", "me"], correct: 0, explanation: "Nous nous brossons.", category: "Vocabulary" },
            { question: "Il ___ lave avant de dormir.", options: ["se", "me", "te", "le"], correct: 0, explanation: "Il se lave.", category: "Vocabulary" },
            { question: "À quelle heure tu ___ couches ?", options: ["te", "me", "se", "vous"], correct: 0, explanation: "Tu te couches.", category: "Vocabulary" },
            { question: "Après le travail, je ___ repose.", options: ["me", "se", "le", "la"], correct: 0, explanation: "Se reposer = to rest.", category: "Vocabulary" },
            { question: "Vous ___ préparez pour la fête ?", options: ["vous", "nous", "se", "me"], correct: 0, explanation: "Vous vous préparez.", category: "Vocabulary" },
            { question: "Les enfants ___ habillent vite.", options: ["se", "me", "te", "nous"], correct: 0, explanation: "Ils se habillent (s'habillent).", category: "Vocabulary" },
            { question: "Elle ___ maquille dans la salle de bain.", options: ["se", "me", "te", "vous"], correct: 0, explanation: "Elle se maquille.", category: "Vocabulary" },
            { question: "Je ___ promène dans le parc.", options: ["me", "te", "se", "nous"], correct: 0, explanation: "Se promener = to walk.", category: "Vocabulary" },

            // Vocabulary: Work & Health (37-45)
            { question: "J'ai ___ à la tête.", options: ["froid", "mal", "faim", "soif"], correct: 1, explanation: "Avoir mal à = to have a pain.", category: "Vocabulary" },
            { question: "Il travaille dans un hôpital, il est ___.", options: ["infirmier", "avocat", "serveur", "vendeur"], correct: 0, explanation: "Infirmier = nurse.", category: "Vocabulary" },
            { question: "Elle vend des vêtements, elle est ___.", options: ["vendeuse", "boulangère", "pilote", "factrice"], correct: 0, explanation: "Vendeuse = saleswoman.", category: "Vocabulary" },
            { question: "Tu as de la fièvre, tu es ___.", options: ["fatigué", "malade", "heureux", "triste"], correct: 1, explanation: "Malade = sick.", category: "Vocabulary" },
            { question: "Mon métier est ___ les ordinateurs.", options: ["réparer", "manger", "chanter", "danser"], correct: 0, explanation: "Réparer = to repair.", category: "Vocabulary" },
            { question: "Je cherche un ___ dans la comptabilité.", options: ["emploi", "appartement", "repas", "vêtement"], correct: 0, explanation: "Emploi = job.", category: "Vocabulary" },
            { question: "Le ___ soigne les dents.", options: ["dentiste", "médecin", "pharmacien", "opticien"], correct: 0, explanation: "Dentiste.", category: "Vocabulary" },
            { question: "J'ai besoin d'un ___ pour travailler.", options: ["ordinateur", "lit", "four", "canapé"], correct: 0, explanation: "Computer.", category: "Vocabulary" },
            { question: "Prenez ce ___ trois fois par jour.", options: ["médicament", "livre", "stylo", "vélo"], correct: 0, explanation: "Médicament = medicine.", category: "Vocabulary" },

            // Mixed Grammar: Pronouns & Quantities (46-54)
            { question: "Je ___ regarde (la télé).", options: ["la", "le", "les", "lui"], correct: 0, explanation: "Direct object pronoun for feminine.", category: "Grammar" },
            { question: "Tu ___ téléphones (à ta mère) ?", options: ["lui", "la", "le", "les"], correct: 0, explanation: "Indirect object (téléphoner à) uses 'lui'.", category: "Grammar" },
            { question: "Je mange ___ pain.", options: ["du", "de la", "des", "le"], correct: 0, explanation: "Partitive article for masculine (bread).", category: "Grammar" },
            { question: "Il y a ___ étudiants dans la classe.", options: ["beaucoup d'", "beaucoup", "très", "trop le"], correct: 0, explanation: "Beaucoup de/d' is the fixed expression.", category: "Grammar" },
            { question: "Je n'ai pas ___ voiture.", options: ["de", "du", "une", "la"], correct: 0, explanation: "Negation: un/une/du becomes 'de'.", category: "Grammar" },
            { question: "Donne-___ le livre.", options: ["moi", "me", "je", "ma"], correct: 0, explanation: "Imperative uses 'moi' at the end.", category: "Grammar" },
            { question: "C'est ___ voiture ?", options: ["ta", "ton", "tes", "toi"], correct: 0, explanation: "Voiture is feminine.", category: "Grammar" },
            { question: "Ils sont plus grands ___ nous.", options: ["que", "de", "comme", "et"], correct: 0, explanation: "Comparison: plus... que.", category: "Grammar" },
            { question: "Je bois ___ eau.", options: ["de l'", "du", "de la", "des"], correct: 0, explanation: "De l' before a vowel.", category: "Grammar" }
        ];

        let state = {
            gameState: 'start',
            currentIdx: 0,
            score: 0,
            selectedIdx: null,
            isAnswered: false,
            aiHint: "",
            isLoadingAI: false,
            chatMessages: [],
            isSpeaking: null,
            streak: 0
        };

        // --- CORE LOGIC (STREAK, RENDER, ETC) ---
        function updateStreak() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('delf_last_date');
            let currentStreak = parseInt(localStorage.getItem('delf_streak')) || 0;

            if (lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (lastDate === yesterday.toDateString()) {
                    currentStreak++;
                } else {
                    currentStreak = 1;
                }
                localStorage.setItem('delf_last_date', today);
                localStorage.setItem('delf_streak', currentStreak);
            }
            state.streak = currentStreak;
        }

        function getLevelTitle(score) {
            const pct = (score / QUIZ_DATA.length) * 100;
            if (pct === 100) return "Expert A1.2 🏆";
            if (pct >= 80) return "Maître de la Langue 🌟";
            if (pct >= 50) return "En Progression 📖";
            return "Débutant A1.2 🌱";
        }

        async function fetchWithRetry(url, options) {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error('API failed');
            return await response.json();
        }

        async function getAIHint() {
            if (state.isLoadingAI || state.aiHint) return;
            state.isLoadingAI = true; render();
            const question = QUIZ_DATA[state.currentIdx];
            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `User is taking a DELF A1.2 French quiz. Question: "${question.question}" Give a 1-sentence hint in English without the answer.` }] }] })
                    }
                );
                state.aiHint = result.candidates[0].content.parts[0].text;
            } catch (e) { state.aiHint = "Look at the verb ending or the gender!"; }
            state.isLoadingAI = false; render();
        }

        function speakText(text, id) {
            if (state.isSpeaking === id) return;
            state.isSpeaking = id; render();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.onend = () => { state.isSpeaking = null; render(); };
            window.speechSynthesis.speak(msg);
        }

        async function handleChat(event) {
            event.preventDefault();
            const input = document.getElementById('chat-input');
            const userMsg = input.value.trim();
            if (!userMsg || state.isLoadingAI) return;
            state.chatMessages.push({ role: 'user', text: userMsg });
            input.value = ""; state.isLoadingAI = true; render();
            try {
                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: "user", parts: [{ text: "Act as a French tutor for DELF A1.2 level. Focus on Passé Composé and Daily Routines." }] },
                                ...state.chatMessages.map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] }))
                            ]
                        })
                    }
                );
                state.chatMessages.push({ role: 'bot', text: result.candidates[0].content.parts[0].text });
            } catch (e) { state.chatMessages.push({ role: 'bot', text: "Erreur de connexion..." }); }
            state.isLoadingAI = false; render();
        }

        function render() {
            const app = document.getElementById('app');
            if (state.gameState === 'start') {
                app.innerHTML = `
                    <div class="p-12 text-center space-y-8 fade-in">
                        ${state.streak > 0 ? `
                            <div class="inline-flex items-center gap-2 px-4 py-2 bg-orange-100 text-orange-600 rounded-full font-bold text-sm streak-badge">
                                <i data-lucide="flame" class="w-4 h-4"></i> ${state.streak} JOUR STREAK
                            </div>
                        ` : ''}
                        <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto transform rotate-3 shadow-lg">
                            <i data-lucide="graduation-cap" class="w-12 h-12 text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-5xl font-black tracking-tight text-slate-900 mb-2">DELF A1.2</h1>
                            <p class="text-slate-500 font-medium">54 Questions: Passé, Futur et Routine</p>
                        </div>
                        <button onclick="startGame()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-xl shadow-xl transition-all">Commencer</button>
                    </div>
                `;
            } else if (state.gameState === 'quiz') {
                const q = QUIZ_DATA[state.currentIdx];
                const progress = ((state.currentIdx + 1) / QUIZ_DATA.length) * 100;
                app.innerHTML = `
                    <div class="flex flex-col fade-in">
                        <div class="p-6 bg-white border-b border-slate-100">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-xs font-bold text-blue-600 uppercase tracking-widest">${q.category}</span>
                                <span class="text-sm font-bold text-slate-400">${state.currentIdx + 1} / ${QUIZ_DATA.length}</span>
                            </div>
                            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-600 transition-all duration-500" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-start gap-4 mb-8">
                                <h2 class="text-2xl font-bold text-slate-800">${q.question}</h2>
                                <button onclick="speakText(\`${q.question.replace(/`/g, "")}\`, 'q')" class="p-2 rounded-full ${state.isSpeaking === 'q' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}">
                                    <i data-lucide="volume-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <div class="space-y-3">
                                ${q.options.map((opt, i) => {
                                    let cls = "border-slate-200 hover:border-blue-400";
                                    if (state.isAnswered) {
                                        if (i === q.correct) cls = "bg-emerald-50 border-emerald-500 text-emerald-700";
                                        else if (i === state.selectedIdx) cls = "bg-rose-50 border-rose-500 text-rose-700";
                                        else cls = "opacity-50 border-slate-100";
                                    }
                                    return `
                                        <button onclick="handleAnswer(${i})" ${state.isAnswered ? 'disabled' : ''} class="w-full p-4 text-left rounded-2xl border-2 font-semibold transition-all ${cls}">
                                            ${opt}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                            <div class="mt-6">
                                ${state.isAnswered ? `
                                    <div class="bg-slate-900 p-5 rounded-2xl mb-4 text-white text-sm">
                                        <p class="text-blue-400 font-bold text-xs uppercase mb-1">Explication</p>
                                        ${q.explanation}
                                    </div>
                                    <button onclick="nextQuestion()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                                        Suivant <i data-lucide="arrow-right" class="w-5 h-5"></i>
                                    </button>
                                ` : `
                                    <button onclick="getAIHint()" class="text-amber-600 font-bold text-sm flex items-center gap-2">
                                        <i data-lucide="${state.isLoadingAI ? 'loader-2' : 'sparkles'}" class="w-4 h-4 ${state.isLoadingAI ? 'animate-spin' : ''}"></i>
                                        ${state.aiHint || "Besoin d'un indice ?"}
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.gameState === 'end') {
                const title = getLevelTitle(state.score);
                app.innerHTML = `
                    <div class="flex flex-col h-[650px] fade-in">
                        <div class="p-8 text-center bg-white border-b">
                            <h2 class="text-4xl font-black mb-1">${state.score} / ${QUIZ_DATA.length}</h2>
                            <p class="text-blue-600 font-bold uppercase tracking-widest text-sm">${title}</p>
                        </div>
                        <div class="flex-1 overflow-hidden flex flex-col bg-slate-50">
                            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                                ${state.chatMessages.map(m => `
                                    <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                                        <div class="max-w-[85%] p-3 rounded-2xl text-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border rounded-tl-none'}">
                                            ${m.text}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <form onsubmit="handleChat(event)" class="p-4 bg-white border-t flex gap-2">
                                <input id="chat-input" type="text" placeholder="Pratiquer mon A1.2..." class="flex-1 bg-slate-100 rounded-xl px-4 py-3 text-sm outline-none">
                                <button type="submit" class="p-3 bg-blue-600 text-white rounded-xl"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </form>
                        </div>
                        <div class="p-4 bg-white border-t flex gap-2">
                            <button onclick="startGame()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">Réessayer</button>
                            <button onclick="location.reload()" class="flex-1 py-3 bg-white border rounded-xl font-bold">Menu</button>
                        </div>
                    </div>
                `;
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }
            lucide.createIcons();
        }

        function startGame() {
            state.gameState = 'quiz'; state.currentIdx = 0; state.score = 0; state.isAnswered = false; state.aiHint = ""; state.chatMessages = []; render();
        }
        function handleAnswer(idx) {
            state.selectedIdx = idx; state.isAnswered = true;
            if (idx === QUIZ_DATA[state.currentIdx].correct) state.score++; render();
        }
        function nextQuestion() {
            if (state.currentIdx + 1 < QUIZ_DATA.length) {
                state.currentIdx++; state.isAnswered = false; state.aiHint = ""; render();
            } else {
                updateStreak(); state.gameState = 'end';
                state.chatMessages.push({ role: 'bot', text: "Félicitations ! Tu as terminé le niveau A1.2. Comment s'est passée ta journée d'hier ?" });
                render();
            }
        }

        window.onload = () => {
            state.streak = parseInt(localStorage.getItem('delf_streak')) || 0;
            render();
        };
    </script>
</body>
</html>
